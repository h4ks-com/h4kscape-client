name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: mattfly
  IMAGE_NAME: mattfly/h4kscape-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SERVER_URL=https://scape.h4ks.com
            OAUTH_ENABLED=true
            OAUTH_LOGTO_ENDPOINT=https://auth.h4ks.com
            OAUTH_APP_ID=bc40c9vfeg5i43m9j8bws
            OAUTH_CALLBACK_URL=https://scape.h4ks.com/auth-callback.html
          cache-from: type=gha
          cache-to: type=gha,mode=max
